<!DOCTYPE html>
<html>
<head>
  <title>Quiz</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container">
  <h2>Quiz App</h2>

  <div class="progress">
    <div id="progress-bar"></div>
  </div>

  <p id="question"></p>

  <button class="option" onclick="selectAnswer('A')" id="A"></button>
  <button class="option" onclick="selectAnswer('B')" id="B"></button>
  <button class="option" onclick="selectAnswer('C')" id="C"></button>
  <button class="option" onclick="selectAnswer('D')" id="D"></button>

  <div class="nav">
    <button onclick="prevQuestion()">⬅ Back</button>
    <button onclick="nextQuestion()">Next ➡</button>
  </div>
</div>

<script src="script.js"></script>

</body>
</html>
